<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:15px;min-height:100vh}

/* ---- LOGIN ---- */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:#fff;border:1.5px solid #e5e5e5;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px}
.login-logo{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:1.5rem}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:.4rem}
.login-box p{font-size:13.5px;color:#666;margin-bottom:1.8rem}
.login-box input{display:block;width:100%;padding:12px 14px;font-size:15px;font-family:inherit;border:1.5px solid #e5e5e5;border-radius:10px;background:#fafafa;outline:none;margin-bottom:.75rem;transition:border-color .2s}
.login-box input:focus{border-color:#1a1a1a;background:#fff}
.btn-login{width:100%;padding:13px;font-size:15px;font-weight:600;font-family:inherit;background:#1a1a1a;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:.5rem}
.btn-login:active{opacity:.8}
.btn-login:disabled{opacity:.5}
#login-err{font-size:13px;color:#ef4444;margin-top:.75rem;min-height:1.2em;font-weight:500}

/* ---- LAYOUT ---- */
#admin-panel{display:none;flex-direction:column;min-height:100vh}
header{background:#1a1a1a;color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-shrink:0}
.header-title{font-size:15px;font-weight:700;letter-spacing:-.1px}
.header-right{display:flex;align-items:center;gap:1rem}
.header-user{font-size:12.5px;color:#aaa}
.btn-logout{font-size:13px;font-weight:600;font-family:inherit;background:transparent;color:#fff;border:1.5px solid #444;border-radius:8px;padding:6px 14px;cursor:pointer}
.btn-logout:hover{border-color:#888}

main{flex:1;padding:1.25rem 1.5rem;max-width:1800px;width:100%;margin:0 auto}

/* ---- SCHEDA TABS ---- */
.scheda-tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{padding:8px 18px;font-size:14px;font-weight:600;font-family:inherit;background:#fff;color:#666;border:1.5px solid #e5e5e5;border-radius:9px;cursor:pointer;transition:all .15s}
.tab-btn:hover{border-color:#aaa;color:#1a1a1a}
.tab-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* ---- FILTERS ---- */
.filters-card{background:#fff;border:1.5px solid #e5e5e5;border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:130px}
.filter-group label{font-size:11.5px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.3px}
.filter-group select,.filter-group input{padding:8px 10px;font-size:14px;font-family:inherit;border:1.5px solid #e5e5e5;border-radius:8px;background:#fafafa;outline:none;min-height:38px}
.filter-group select:focus,.filter-group input:focus{border-color:#1a1a1a}
.filter-btns{display:flex;gap:.5rem;align-items:flex-end;margin-left:auto;flex-wrap:wrap}
.btn-filter{padding:8px 18px;font-size:14px;font-weight:600;font-family:inherit;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;min-height:38px}
.btn-filter:active{opacity:.8}
.btn-reset{padding:8px 18px;font-size:14px;font-weight:600;font-family:inherit;background:#fff;color:#1a1a1a;border:1.5px solid #ccc;border-radius:8px;cursor:pointer;min-height:38px}
.btn-reset:active{background:#f0f0ee}

/* ---- STATS ROW ---- */
.stats-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
.count-label{font-size:14px;font-weight:600;color:#444}
.count-label span{color:#1a1a1a;font-size:15px}
.btn-csv{display:flex;align-items:center;gap:7px;padding:9px 18px;font-size:14px;font-weight:600;font-family:inherit;background:#fff;color:#1a1a1a;border:1.5px solid #ccc;border-radius:9px;cursor:pointer}
.btn-csv:active{background:#f0f0ee}
.btn-csv:disabled{opacity:.5}

/* ---- TABLE ---- */
.table-wrap{background:#fff;border:1.5px solid #e5e5e5;border-radius:12px;overflow:auto;margin-bottom:.75rem}
table{width:100%;border-collapse:collapse;font-size:13.5px;white-space:nowrap}
thead th{position:sticky;top:0;background:#f7f7f5;padding:10px 13px;text-align:left;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#888;border-bottom:1.5px solid #e5e5e5}
tbody tr{border-bottom:1px solid #f0f0ee;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tbody td{padding:9px 13px;color:#1a1a1a;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600}
.badge-base{background:#dbeafe;color:#1d4ed8}
.badge-completa{background:#d1fae5;color:#065f46}
.empty-row td{text-align:center;padding:3rem;color:#888;font-size:14px}

/* ---- PAGINATION ---- */
.pagination{display:flex;align-items:center;gap:.75rem;justify-content:flex-end;flex-wrap:wrap}
.page-label{font-size:13.5px;color:#666;font-weight:500}
.btn-page{padding:7px 16px;font-size:13.5px;font-weight:600;font-family:inherit;background:#fff;color:#1a1a1a;border:1.5px solid #ccc;border-radius:8px;cursor:pointer;min-height:36px}
.btn-page:disabled{opacity:.35;cursor:default}

    <h1>Pannello Admin</h1>
    <p>Accedi con le tue credenziali per visualizzare le schede.</p>

      <p id="login-err"></p>
    </form>
  </div>
</div>

      <button class="tab-btn" onclick="switchScheda('osservativa')">Scheda Osservativa</button>
    </div>

    <!-- Filters -->
    <div class="filters-card">
      <div class="filter-group">
        <label>ASL</label>
        <select id="f-asl">
          <option value="">Tutte le ASL</option>
          <option>ASL AL</option><option>ASL AT</option><option>ASL BI</option>
          <option>ASL CN1</option><option>ASL CN2</option><option>ASL NO</option>

          <option>ASL TO4</option><option>ASL TO5</option><option>ASL VC</option>
          <option>ASL VCO</option><option>NEUTRAVEL</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Data evento dal</label>
        <input type="date" id="f-da">
      </div>
      <div class="filter-group">
        <label>Data evento al</label>
        <input type="date" id="f-a">
      </div>
      <div class="filter-group" id="fg-tipo">
        <label>Tipo risposta</label>
        <select id="f-tipo">
          <option value="">Tutti i tipi</option>
          <option value="base">Base</option>
          <option value="completa">Completa</option>
        </select>
      </div>
      <div class="filter-btns">
        <button class="btn-reset" onclick="resetFilters()">Reset</button>
        <button class="btn-filter" onclick="applyFilters()">Filtra</button>
      </div>
    </div>

    <!-- Stats + Export -->
    <div class="stats-row">
      <p class="count-label" id="count-label">Caricamento…</p>
      <button class="btn-csv" id="btn-csv" onclick="exportCSV()">⬇ Esporta CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead id="table-head"><tr></tr></thead>
        <tbody id="table-body">

        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <button class="btn-page" id="btn-prev" onclick="prevPage()" disabled>← Prec</button>
      <span class="page-label" id="page-label">Pagina 1 di 1</span>
      <button class="btn-page" id="btn-next" onclick="nextPage()" disabled>Succ →</button>

  </main>
</div>

/* ============================================================
   STATE
============================================================ */
const PAGE_SIZE = 100;
let currentPage = 0;
let totalCount  = 0;
let activeScheda = 'etilometro';

/* ============================================================
   AUTH
============================================================ */
db.auth.onAuthStateChange((_e, session) => {
  if (session) {
    document.getElementById('user-email').textContent = session.user.email;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'flex';
    loadData();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
  }
});

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Accesso…';
  const { error } = await db.auth.signInWithPassword({
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
  });
  if (error) {
    document.getElementById('login-err').textContent = 'Email o password non corretti.';
    btn.disabled = false; btn.textContent = 'Accedi';
  }
}

async function doLogout() { await db.auth.signOut(); }

/* ============================================================
   SCHEDA SWITCH
============================================================ */
function switchScheda(key) {
  activeScheda = key;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(SCHEMAS)[i] === key);
  });
  const schema = SCHEMAS[key];
  document.getElementById('fg-tipo').style.display = schema.filterTipo ? '' : 'none';
  resetFilters();
}

/* ============================================================
   FILTERS
============================================================ */
function getFilters() {
  return {
    asl:  document.getElementById('f-asl').value,
    da:   document.getElementById('f-da').value,
    a:    document.getElementById('f-a').value,
    tipo: document.getElementById('f-tipo').value,
  };
}

function buildQuery(f, selectStr) {
  const schema = SCHEMAS[activeScheda];
  let q = db.from(schema.table).select(selectStr, { count: 'exact' });
  if (f.asl)  q = q.eq('asl', f.asl);
  if (f.da)   q = q.gte(schema.dateField, f.da);
  if (f.a)    q = q.lte(schema.dateField, f.a);
  if (schema.filterTipo && f.tipo) q = q.eq('tipo_risposta', f.tipo);
  return q;
}

function applyFilters() { currentPage = 0; loadData(); }
function resetFilters() {
  ['f-asl','f-da','f-a','f-tipo'].forEach(id => document.getElementById(id).value = '');
  currentPage = 0; loadData();
}
function prevPage() { if (currentPage > 0) { currentPage--; loadData(); } }
function nextPage() { if ((currentPage + 1) * PAGE_SIZE < totalCount) { currentPage++; loadData(); } }

/* ============================================================
   LOAD DATA
============================================================ */
async function loadData() {
  const schema = SCHEMAS[activeScheda];
  const ncols = schema.displayCols.length;

  document.getElementById('count-label').textContent = 'Caricamento…';
  document.getElementById('table-body').innerHTML =
    `<tr><td colspan="${ncols}" class="loading">Caricamento…</td></tr>`;

  renderHeader(schema);

  const f = getFilters();
  const q = buildQuery(f, '*')
    .order('creato_il', { ascending: false })
    .range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

  const { data, count, error } = await q;
  if (error) {
    document.getElementById('count-label').textContent = 'Errore nel caricamento.';
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="${ncols}" class="loading">Errore: ${error.message}</td></tr>`;
    return;
  }

  totalCount = count || 0;
  const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
  document.getElementById('count-label').innerHTML = `<span>${totalCount}</span> schede trovate`;
  document.getElementById('page-label').textContent = `Pagina ${currentPage + 1} di ${totalPages}`;
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = (currentPage + 1) * PAGE_SIZE >= totalCount;

  renderTable(data || [], schema);
}

/* ============================================================
   RENDER
============================================================ */
function renderHeader(schema) {
  document.getElementById('table-head').innerHTML =
    '<tr>' + schema.displayCols.map(c => `<th>${c.l}</th>`).join('') + '</tr>';
}

function cellVal(v, col) {
  if (v === null || v === undefined || v === '') return '<td style="color:#ccc">—</td>';
  if (Array.isArray(v)) {
    const joined = v.join(', ');
    return `<td title="${esc(joined)}">${esc(joined)}</td>`;
  }
  if (col && col.badge) {
    return `<td><span class="badge badge-${v}">${v}</span></td>`;
  }
  const s = String(v);
  return `<td title="${esc(s)}">${esc(s)}</td>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderTable(rows, schema) {
  const tbody = document.getElementById('table-body');
  const ncols = schema.displayCols.length;
  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${ncols}">Nessuna scheda trovata con i filtri selezionati.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r =>
    '<tr>' + schema.displayCols.map(c => cellVal(r[c.k], c)).join('') + '</tr>'
  ).join('');
}

/* ============================================================
   EXPORT CSV
============================================================ */
function csvEsc(v) {
  if (v === null || v === undefined) return '';
  if (Array.isArray(v)) v = v.join('; ');
  v = String(v);
  return (v.includes(',') || v.includes('"') || v.includes('\n'))
    ? '"' + v.replace(/"/g, '""') + '"'
    : v;
}

async function exportCSV() {
  const btn = document.getElementById('btn-csv');
  btn.disabled = true; btn.textContent = 'Esportazione…';

  const schema = SCHEMAS[activeScheda];
  const f = getFilters();
  let all = [], from = 0;
  while (true) {
    const q = buildQuery(f, '*')
      .order('creato_il', { ascending: false })
      .range(from, from + 999);
    const { data, error } = await q;
    if (error || !data || !data.length) break;
    all = all.concat(data);
    if (data.length < 1000) break;
    from += 1000;
  }

  const header = schema.csvCols.map(c => c[1]).join(',');
  const rows = all.map(r => schema.csvCols.map(([k]) => csvEsc(r[k])).join(','));
  const csv = '﻿' + [header, ...rows].join('\r\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  const today = new Date().toISOString().slice(0,10);
  a.download = `${activeScheda}_${today}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);

  btn.disabled = false; btn.textContent = '⬇ Esporta CSV';
}
</script>
